name: Upload Obsidian Daylio Parser

on:
  release:
    types: [published]

permissions:
  contents: read
  # https://docs.pypi.org/trusted-publishers/using-a-publisher/
  # Note the id-token: write permission: you must provide this permission at either the job level (strongly recommended) or workflow level (discouraged). Without it, the publishing action won't have sufficient permissions to identify itself to PyPI.
  id-token: write

jobs:
  # first make sure that the integration tests pass on the code
  integration:
    uses: ./.github/workflows/integration-gate.yaml

  # then
  deploy:
    needs: integration
    permissions:
      contents: read
      id-token: write
    # every job that specifies an environment will automatically deploy the result
    # https://docs.github.com/en/actions/how-tos/deploy/configure-and-manage-deployments/control-deployments#using-environments-without-deployments
    environment: production

    runs-on: ubuntu-latest

    steps:
      - name: Check-out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # versioningit needs full history and tags
      - name: Set up Python env
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Build
        run: |
          python -m pip install build
          python -m build
      - name: Publish this release
        # with trusted publishing
        uses: pypa/gh-action-pypi-publish@v1.13.0
