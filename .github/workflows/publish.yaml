name: Upload Obsidian Daylio Parser

on:
  release:
    types: [published]

jobs:
  # first make sure that the integration tests pass on the code
  integration:
    permissions:
      contents: read
    uses: ./.github/workflows/integration-gate.yaml

  # build in a separate job so that build-time dependencies
  # don't run with the elevated id-token: write privilege
  build:
    needs: integration
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Check-out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # versioningit needs full history and tags
      - name: Set up Python env
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Build
        run: |
          python -m pip install build
          python -m build
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # then publish in a job with only the privileges it needs
  deploy:
    needs: build
    permissions:
      contents: read
      # https://docs.pypi.org/trusted-publishers/using-a-publisher/
      # id-token: write is required for OIDC Trusted Publishing to PyPI
      id-token: write
    # every job that specifies an environment will automatically deploy the result
    # https://docs.github.com/en/actions/how-tos/deploy/configure-and-manage-deployments/control-deployments#using-environments-without-deployments
    environment: production

    runs-on: ubuntu-latest

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish this release
        # with trusted publishing
        uses: pypa/gh-action-pypi-publish@v1.13.0
