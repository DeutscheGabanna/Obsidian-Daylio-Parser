name: Upload Obsidian Daylio Parser to Test PyPi

on:
  push:
    branches:
      - dev-stage

jobs:
  integration:
    permissions:
      contents: read
    uses: ./.github/workflows/integration-gate.yaml

  # build in a separate job so that build-time dependencies
  # don't run with the elevated id-token: write privilege
  build:
    needs: integration
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Check-out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # versioningit needs full history and tags
      - name: Set up Python env
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Build
        run: |
          python -m pip install build
          python -m build
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  deploy:
    needs: build
    permissions:
      contents: read
      # https://docs.pypi.org/trusted-publishers/using-a-publisher/
      # id-token: write is required for OIDC Trusted Publishing to PyPI
      id-token: write

    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish on Test PyPi
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          # with trusted publishing
          repository-url: https://test.pypi.org/legacy/